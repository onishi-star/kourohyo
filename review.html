<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>復習</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --primary:    #2ecc87;
      --primary-dk: #27ae71;
      --primary-soft: #e0f7ef;
      --bg:         #f2f7f5;
      --surface:    #ffffff;
      --border:     #d8e8e0;
      --text:       #1a2e26;
      --text-sub:   #7a9a8a;
      --shadow:     0 2px 14px rgba(0,0,0,0.07);
      --radius:     16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding-bottom: 60px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    header h1 { font-size: 17px; font-weight: 700; flex:1; }
    .date-badge {
      font-size: 12px; color: var(--text-sub);
      background: var(--bg); padding: 4px 10px;
      border-radius: 10px; border: 1px solid var(--border);
    }

    main {
      flex: 1; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 今日の計画 ── */
    .plan-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .plan-item:hover { background: var(--bg); }
    .plan-item.done  { opacity: 0.55; }
    .plan-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .plan-info { flex: 1; }
    .plan-name { font-size: 14px; font-weight: 600; }
    .plan-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .plan-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
      transition: all 0.2s;
    }
    .plan-item.done .plan-check {
      background: var(--primary); border-color: var(--primary); color: white;
    }
    .no-plan { font-size: 13px; color: var(--text-sub); padding: 8px 0; }

    /* ── 進捗バー ── */
    .progress-wrap {
      background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; margin-top: 8px;
    }
    .progress-bar {
      height: 100%; border-radius: 6px;
      background: linear-gradient(to right, var(--primary), var(--primary-dk));
      transition: width 0.5s ease;
    }
    .progress-label { font-size: 12px; color: var(--text-sub); margin-top: 5px; }

    /* ── AIボタン ── */
    .ai-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2ecc87, #27ae71);
      color: white;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(46,204,135,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      font-family: inherit;
    }
    .ai-btn:hover  { transform: scale(1.02); box-shadow: 0 6px 20px rgba(46,204,135,0.4); }
    .ai-btn:active { transform: scale(0.98); }
    .ai-btn:disabled {
      background: #ccc; box-shadow: none; cursor: not-allowed; transform: none;
    }

    /* ── 問題カード ── */
    .question-card {
      border-left: 4px solid var(--primary);
      padding: 14px 14px 14px 16px;
      border-radius: 0 12px 12px 0;
      background: var(--primary-soft);
      margin-bottom: 10px;
      position: relative;
    }
    .q-label {
      font-size: 11px; font-weight: 700;
      color: var(--primary-dk); margin-bottom: 6px;
      letter-spacing: 0.06em;
    }
    .q-text { font-size: 14px; line-height: 1.65; }
    .q-source { font-size: 11px; color: var(--text-sub); margin-top: 6px; }

    .answer-area {
      margin-top: 8px;
    }
    .answer-area textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px; font-family: inherit;
      resize: none; background: var(--surface);
      min-height: 80px;
    }
    .answer-area textarea:focus { outline: none; border-color: var(--primary); }

    .answer-btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-check {
      flex: 1; padding: 9px;
      background: var(--primary); color: white;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-check:hover { background: var(--primary-dk); }
    .btn-skip {
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface);
      font-size: 13px; cursor: pointer; font-family: inherit;
    }

    .feedback-box {
      margin-top: 10px; padding: 12px;
      border-radius: 10px; font-size: 13px; line-height: 1.6;
    }
    .feedback-box.correct { background: #e8f8ee; border: 1px solid #a8dfc0; color: #1a6640; }
    .feedback-box.wrong   { background: #fff5f5; border: 1px solid #f0b8b8; color: #8b2020; }

    /* ── ローディング ── */
    .loading-dots {
      display: inline-flex; gap: 5px; align-items: center;
    }
    .loading-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: white; animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* ── 学んだこと入力 ── */
    .learned-toggle {
      font-size: 12px; color: var(--primary-dk);
      background: none; border: none; cursor: pointer;
      padding: 4px 0; font-family: inherit;
      text-decoration: underline;
    }
    .learned-area {
      display: none;
      margin-top: 8px;
    }
    .learned-area textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px; font-family: inherit;
      resize: none; background: var(--bg);
      min-height: 64px;
      transition: border-color .15s;
    }
    .learned-area textarea:focus { outline: none; border-color: var(--primary); }
    .learned-area .char-hint { font-size: 11px; color: var(--text-sub); margin-top: 3px; }

    /* ── 空状態 ── */
    .empty-state {
      text-align: center; padding: 32px 16px; color: var(--text-sub);
    }
    .empty-state .emoji { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>📝 復習</h1>
  <div class="date-badge" id="dateLabel"></div>
</header>

<main>

  <!-- 今日の計画チェック -->
  <div class="card">
    <div class="card-title">📋 今日の計画</div>
    <div id="planList">
      <div class="empty-state" style="padding:16px 0;">
        <div class="emoji">📅</div>
        <p>スケジュールページで教材を予約すると<br>ここに表示されます</p>
      </div>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <!-- AI復習問題 -->
  <div class="card">
    <div class="card-title">🤖 AI復習問題</div>

    <div id="aiEmptyState" class="empty-state" style="padding:16px 0;">
      <div class="emoji">💡</div>
      <p>今日やった教材をもとに<br>AIが復習問題を出題します</p>
    </div>

    <div id="questionArea" style="display:none;"></div>

    <button class="ai-btn" id="aiBtn" onclick="generateQuestions()">
      ✨ 復習問題を生成する
    </button>
    <p style="font-size:11px;color:var(--text-sub);text-align:center;margin-top:8px;" id="aiNote">
      今日学習した教材の範囲から問題を作成します
    </p>
  </div>

</main>

<script src="nav.js"></script>
<script>
// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyDOi3w86aPi5R5XjGBaUJ_RvkTiS5WqwF0",
  authDomain: "achedule-app.firebaseapp.com",
  projectId: "achedule-app",
  storageBucket: "achedule-app.firebasestorage.app",
  messagingSenderId: "823858682336",
  appId: "1:823858682336:web:ec4629dbe4ace91a7a7385"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── 日付 ──
const today = new Date();
const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
document.getElementById('dateLabel').textContent =
  `${today.getMonth()+1}月${today.getDate()}日（${'日月火水木金土'[today.getDay()]}）`;

// ── 今日の計画を読み込む（Firestoreから） ──
let todayPlans   = []; // { matName, matColor, matId, hour, pageFrom, pageTo, done }
let doneSet      = new Set(JSON.parse(localStorage.getItem('review_done_' + dateStr) || '[]'));

async function loadTodayPlans() {
  try {
    // 今日の曜日列を計算（週の月曜起点docId）
    const weekStartDay = parseInt(localStorage.getItem('weekStartDay') || '1');
    const dow = today.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    const mon = new Date(today);
    mon.setDate(today.getDate() + diff);
    mon.setHours(0, 0, 0, 0);
    const docId = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;

    const doc = await db.collection('schedules2').doc(docId).get();
    if (!doc.exists) return;
    const data = doc.data();

    const plans = [];
    Object.entries(data).forEach(([key, val]) => {
      if (!key.startsWith(dateStr)) return;
      if (!val.cell || val.cell.mode !== 'study' || !val.cell.materialId) return;
      const hour = parseInt(key.split('-')[3]);
      plans.push({
        key,
        hour,
        matId:    val.cell.materialId,
        matName:  val.cell.materialName,
        matColor: val.cell.materialColor,
        pageFrom: val.cell.pageFrom,
        pageTo:   val.cell.pageTo,
        done: doneSet.has(key),
      });
    });
    plans.sort((a, b) => a.hour - b.hour);
    todayPlans = plans;
    renderPlanList();
  } catch(e) {
    console.error(e);
  }
}

function renderPlanList() {
  const el = document.getElementById('planList');
  if (!todayPlans.length) {
    el.innerHTML = `<div class="empty-state" style="padding:16px 0;">
      <div class="emoji">📅</div>
      <p>スケジュールページで教材を予約すると<br>ここに表示されます</p>
    </div>`;
    document.getElementById('progressWrap').style.display = 'none';
    return;
  }
  el.innerHTML = '';
  todayPlans.forEach((p, idx) => {
    const item = document.createElement('div');
    item.style.cssText = 'margin-bottom:10px;';
    const pages = p.pageFrom && p.pageTo
      ? ` <span style="color:var(--text-sub)">p${p.pageFrom}〜${p.pageTo}</span>` : '';
    const savedLearned = localStorage.getItem(`review_learned_${dateStr}_${p.key}`) || '';
    item.innerHTML = `
      <div class="plan-item${p.done ? ' done' : ''}" id="planItem-${idx}" onclick="toggleDone(${idx})">
        <div class="plan-dot" style="background:${p.matColor}"></div>
        <div class="plan-info">
          <div class="plan-name">${p.matName}</div>
          <div class="plan-sub">${p.hour}:00〜${p.hour+1}:00${pages}</div>
        </div>
        <div class="plan-check">${p.done ? '✓' : ''}</div>
      </div>
      <div style="padding:0 4px;">
        <button class="learned-toggle" onclick="toggleLearnedArea(${idx})">📝 学んだことを記入する</button>
        <div class="learned-area" id="learnedArea-${idx}">
          <textarea id="learnedText-${idx}"
            placeholder="例：三角関数の加法定理、sin(A+B)=sinAcosB+cosAsinBを覚えた。微分の基本公式も確認した。"
            oninput="saveLearnedText(${idx})"
          >${savedLearned}</textarea>
          <div class="char-hint">ここに記入した内容をもとにAIが問題を作ります</div>
        </div>
      </div>
    `;
    el.appendChild(item);
    // すでに内容があれば欄を開いておく
    if (savedLearned) {
      document.getElementById(`learnedArea-${idx}`).style.display = 'block';
    }
  });

  // 進捗
  const done = todayPlans.filter(p => p.done).length;
  const total = todayPlans.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width   = pct + '%';
  document.getElementById('progressLabel').textContent = `${done}/${total} 完了（${pct}%）`;

  // AI生成ボタンのヒント更新
  const matNames = [...new Set(todayPlans.map(p => p.matName))].join('・');
  document.getElementById('aiNote').textContent = matNames
    ? `対象：${matNames}` : '今日学習した教材の範囲から問題を作成します';
}

function toggleLearnedArea(idx) {
  const area = document.getElementById(`learnedArea-${idx}`);
  const isOpen = area.style.display === 'block';
  area.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) document.getElementById(`learnedText-${idx}`).focus();
}

function saveLearnedText(idx) {
  const p = todayPlans[idx];
  const text = document.getElementById(`learnedText-${idx}`).value;
  localStorage.setItem(`review_learned_${dateStr}_${p.key}`, text);
}

function toggleDone(idx) {
  const plan = todayPlans[idx];
  plan.done = !plan.done;
  if (plan.done) doneSet.add(plan.key);
  else           doneSet.delete(plan.key);
  localStorage.setItem('review_done_' + dateStr, JSON.stringify([...doneSet]));
  renderPlanList();
}

// ── AI問題生成 ──
let questions     = [];
let currentQIndex = 0;

async function generateQuestions() {
  const btn = document.getElementById('aiBtn');

  if (!todayPlans.length) {
    alert('今日の計画がありません。');
    return;
  }

  // ローディング表示
  btn.disabled = true;
  btn.innerHTML = '問題を生成中...';

  // ▼ ダミー問題
  questions = [
    {
      q: "sin²θ + cos²θ = ?",
      a: "1",
      hint: "三角関数の基本公式です",
      subject: "数学"
    },
    {
      q: "一次関数 y = 2x + 3 の傾きは？",
      a: "2",
      hint: "xの係数が傾きです",
      subject: "数学"
    },
    {
      q: "英単語 'important' の意味は？",
      a: "重要な",
      hint: "テストによく出る単語です",
      subject: "英語"
    }
  ];

  // ランダムに並び替え（任意だけどおすすめ）
  questions.sort(() => Math.random() - 0.5);

  currentQIndex = 0;

  // 少し待ってから表示（AIっぽく）
  setTimeout(() => {
    renderQuestion();
    btn.innerHTML = '✨ もう一度生成する';
    btn.disabled = false;
  }, 800);
}

  // 教材情報と「学んだこと」を収集
  const matGroups = {};
  todayPlans.forEach((p, idx) => {
    const learned = (localStorage.getItem(`review_learned_${dateStr}_${p.key}`) || '').trim();
    if (!matGroups[p.matId]) matGroups[p.matId] = { name: p.matName, ranges: [], learnedList: [] };
    if (p.pageFrom && p.pageTo) matGroups[p.matId].ranges.push(`p${p.pageFrom}〜${p.pageTo}`);
    if (learned) matGroups[p.matId].learnedList.push(learned);
  });

  const hasLearned = Object.values(matGroups).some(m => m.learnedList.length > 0);
  const matDetails = Object.values(matGroups).map(m => {
    let detail = m.name;
    if (m.ranges.length) detail += `（${m.ranges.join('、')}）`;
    if (m.learnedList.length) detail += `\n　今日学んだこと：${m.learnedList.join('／')}`;
    return detail;
  }).join('\n');

  // ローディング表示
  btn.disabled = true;
  btn.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div> 問題を生成中...`;
  document.getElementById('aiEmptyState').style.display = 'none';
  document.getElementById('questionArea').style.display = 'none';

  try {
    const prompt = `あなたは日本の高校生・受験生向けの学習アシスタントです。
今日の学習内容：
${matDetails}

${hasLearned
  ? '上記の「今日学んだこと」の内容を最優先にして、その内容を正確に問うような復習問題を3問作成してください。'
  : '上記の教材・範囲から、復習に適した問題を3問作成してください。'
}

以下のJSON形式のみで返答してください（説明文や\`\`\`は不要）：
[
  {
    "q": "問題文",
    "a": "模範解答（簡潔に）",
    "hint": "ヒント（1文）",
    "subject": "教材名"
  }
]

注意：
- 学んだことに記載された具体的な内容・用語・公式を直接問う形式で
- 記述式または短答式で
- 高校レベルの難易度で`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    questions = JSON.parse(clean);
    currentQIndex = 0;
    renderQuestion();
    btn.innerHTML = '✨ もう一度生成する';
  } catch(e) {
    console.error(e);
    btn.innerHTML = '⚠️ 生成に失敗しました。再試行';
  }
  btn.disabled = false;
}

function renderQuestion() {
  const area = document.getElementById('questionArea');
  if (!questions.length) return;

  const q = questions[currentQIndex];
  area.style.display = 'block';
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:12px;color:var(--text-sub);">問題 ${currentQIndex+1} / ${questions.length}</span>
      <span style="font-size:11px;background:var(--primary-soft);color:var(--primary-dk);padding:3px 10px;border-radius:10px;">${q.subject}</span>
    </div>
    <div class="question-card">
      <div class="q-label">Q${currentQIndex+1}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="answer-area">
      <textarea id="answerInput" placeholder="ここに答えを書いてください..."></textarea>
      <div id="hintArea" style="font-size:12px;color:var(--text-sub);margin-top:4px;cursor:pointer;text-decoration:underline;" onclick="showHint()">
        💡 ヒントを見る
      </div>
      <div class="answer-btn-row">
        <button class="btn-check" onclick="checkAnswer()">答え合わせ</button>
        <button class="btn-skip"  onclick="nextQuestion()">スキップ</button>
      </div>
      <div id="feedbackBox" style="display:none;"></div>
    </div>
  `;
}

function showHint() {
  const q = questions[currentQIndex];
  document.getElementById('hintArea').innerHTML =
    `<span style="color:var(--primary-dk);">💡 ${q.hint}</span>`;
}

function checkAnswer() {
  const ans = document.getElementById('answerInput').value.trim();
  const q   = questions[currentQIndex];
  const fb  = document.getElementById('feedbackBox');
  fb.style.display = 'block';

  // 簡易判定（空欄チェック）
  if (!ans) {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<b>答えを入力してください</b>`;
    return;
  }

  fb.className = 'feedback-box correct';
  fb.innerHTML = `
    <b>✅ 模範解答</b><br>
    <span style="margin-top:4px;display:block;">${q.a}</span>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button onclick="markResult(true)"  style="flex:1;padding:7px;background:#27ae71;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">⭕ 合ってた</button>
      <button onclick="markResult(false)" style="flex:1;padding:7px;background:#e74c3c;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">❌ 違った</button>
    </div>
  `;
}

function markResult(correct) {
  // 将来: 正誤記録をFirestoreに保存
  saveResult(questions[currentQIndex], correct);
  nextQuestion();
}

function nextQuestion() {
  if (currentQIndex < questions.length - 1) {
    currentQIndex++;
    renderQuestion();
  } else {
    document.getElementById('questionArea').innerHTML = `
      <div class="empty-state">
        <div class="emoji">🎉</div>
        <p>全問終了！<br>お疲れさまでした</p>
      </div>
    `;
  }
}

// 将来: 正誤記録の保存（Firestoreに蓄積→弱点分析に使う）
async function saveResult(q, correct) {
  try {
    await db.collection('review_results').add({
      date:    dateStr,
      subject: q.subject,
      question: q.q,
      correct,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } catch(e) {}
}

// ── 初期化 ──
loadTodayPlans();
