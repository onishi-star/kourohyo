<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>復習</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --primary:      #2ecc87;
      --primary-dk:   #27ae71;
      --primary-soft: #e0f7ef;
      --bg:           #f2f7f5;
      --surface:      #ffffff;
      --border:       #d8e8e0;
      --text:         #1a2e26;
      --text-sub:     #7a9a8a;
      --shadow:       0 2px 14px rgba(0,0,0,0.07);
      --radius:       16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      padding-bottom: 60px;
    }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    header h1 { font-size: 17px; font-weight: 700; flex:1; }
    .date-badge {
      font-size: 12px; color: var(--text-sub);
      background: var(--bg); padding: 4px 10px;
      border-radius: 10px; border: 1px solid var(--border);
    }
    main {
      flex: 1; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }
    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 今日の計画 ── */
    .plan-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); margin-bottom: 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .plan-item:hover { background: var(--bg); }
    .plan-item.done  { opacity: 0.55; }
    .plan-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .plan-info { flex: 1; }
    .plan-name { font-size: 14px; font-weight: 600; }
    .plan-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .plan-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; transition: all 0.2s;
    }
    .plan-item.done .plan-check {
      background: var(--primary); border-color: var(--primary); color: white;
    }

    /* ── 進捗バー ── */
    .progress-wrap {
      background: var(--border); border-radius: 6px; height: 8px;
      overflow: hidden; margin-top: 8px;
    }
    .progress-bar {
      height: 100%; border-radius: 6px;
      background: linear-gradient(to right, var(--primary), var(--primary-dk));
      transition: width 0.5s ease;
    }
    .progress-label { font-size: 12px; color: var(--text-sub); margin-top: 5px; }

    /* ── APIキー設定 ── */
    .api-key-section {
      background: #fffbea; border: 1px solid #ffe082;
      border-radius: 10px; padding: 12px; margin-bottom: 12px;
    }
    .api-key-section p { font-size: 12px; color: #7a6000; margin-bottom: 8px; line-height: 1.6; }
    .api-key-section a { color: #7a6000; }
    .api-key-row { display: flex; gap: 8px; }
    .api-key-row input {
      flex: 1; padding: 7px 10px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 13px; font-family: monospace;
    }
    .api-key-row button {
      padding: 7px 14px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .api-key-saved {
      font-size: 11px; color: var(--primary-dk); margin-top: 6px;
      cursor: pointer; text-decoration: underline;
    }

    /* ── AIボタン ── */
    .ai-btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #2ecc87, #27ae71);
      color: white; font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(46,204,135,0.35);
      transition: transform 0.12s, box-shadow 0.12s; font-family: inherit;
    }
    .ai-btn:hover  { transform: scale(1.02); box-shadow: 0 6px 20px rgba(46,204,135,0.4); }
    .ai-btn:active { transform: scale(0.98); }
    .ai-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

    /* ── 問題カード ── */
    .question-card {
      border-left: 4px solid var(--primary);
      padding: 14px 14px 14px 16px;
      border-radius: 0 12px 12px 0;
      background: var(--primary-soft); margin-bottom: 10px;
    }
    .q-nav   { font-size: 11px; color: var(--text-sub); margin-bottom: 6px; }
    .q-label { font-size: 11px; font-weight: 700; color: var(--primary-dk); margin-bottom: 6px; letter-spacing: 0.06em; }
    .q-text  { font-size: 14px; line-height: 1.65; }
    .q-hint  { font-size: 12px; color: var(--text-sub); margin-top: 6px; }

    .answer-area { margin-top: 8px; }
    .answer-area textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; font-size: 14px; font-family: inherit;
      resize: none; background: var(--surface); min-height: 80px;
    }
    .answer-area textarea:focus { outline: none; border-color: var(--primary); }

    .answer-btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-check {
      flex: 1; padding: 9px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-check:hover    { background: var(--primary-dk); }
    .btn-check:disabled { background: #ccc; cursor: not-allowed; }
    .btn-skip {
      padding: 9px 14px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface);
      font-size: 13px; cursor: pointer; font-family: inherit;
    }

    .feedback-box {
      margin-top: 10px; padding: 12px;
      border-radius: 10px; font-size: 13px; line-height: 1.7;
    }
    .feedback-box.correct  { background: #e8f8ee; border: 1px solid #a8dfc0; color: #1a6640; }
    .feedback-box.wrong    { background: #fff5f5; border: 1px solid #f0b8b8; color: #8b2020; }
    .feedback-box.checking { background: #f5f5f5; border: 1px solid #ddd; color: #555; }

    .btn-next {
      width: 100%; margin-top: 10px; padding: 11px;
      border-radius: 8px; background: var(--primary); color: white;
      border: none; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    /* ── ローディング ── */
    .loading-dots { display: inline-flex; gap: 5px; align-items: center; }
    .loading-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: white; animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* ── 学んだこと入力 ── */
    .learned-toggle {
      font-size: 12px; color: var(--primary-dk);
      background: none; border: none; cursor: pointer;
      padding: 4px 0; font-family: inherit; text-decoration: underline;
    }
    .learned-area { display: none; margin-top: 8px; }
    .learned-area textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 13px; font-family: inherit;
      resize: none; background: var(--bg); min-height: 64px;
    }
    .learned-area textarea:focus { outline: none; border-color: var(--primary); }
    .learned-area .char-hint { font-size: 11px; color: var(--text-sub); margin-top: 3px; }

    /* ── 空状態 ── */
    .empty-state { text-align: center; padding: 32px 16px; color: var(--text-sub); }
    .empty-state .emoji { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <h1>📝 復習</h1>
  <div class="date-badge" id="dateLabel"></div>
</header>

<main>

  <!-- 今日の計画チェック -->
  <div class="card">
    <div class="card-title">📋 今日の計画</div>
    <div id="planList">
      <div class="empty-state" style="padding:16px 0;">
        <div class="emoji">📅</div>
        <p>スケジュールページで教材を予約すると<br>ここに表示されます</p>
      </div>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <!-- AI復習問題 -->
  <div class="card">
    <div class="card-title">🤖 AI復習問題</div>

    <!-- Cohere APIキー設定 -->
    <div class="api-key-section" id="apiKeySection">
      <p>⚙️ Cohere APIキーを入力してください（一度入力するとブラウザに保存されます）<br>
        <a href="https://dashboard.cohere.com/api-keys" target="_blank">→ APIキーはこちらから取得できます</a>
      </p>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="APIキーを入力..." />
        <button onclick="saveApiKey()">保存</button>
      </div>
      <div class="api-key-saved" id="apiKeySaved" style="display:none"
           onclick="resetApiKey()">✅ APIキー保存済み（タップして削除・変更）</div>
    </div>

    <div id="aiEmptyState" class="empty-state" style="padding:16px 0;">
      <div class="emoji">💡</div>
      <p>今日やった教材をもとに<br>AIが復習問題を出題します</p>
    </div>

    <div id="questionArea" style="display:none;"></div>

    <button class="ai-btn" id="aiBtn" onclick="generateQuestions()">
      ✨ 復習問題を生成する
    </button>
    <p style="font-size:11px;color:var(--text-sub);text-align:center;margin-top:8px;" id="aiNote">
      今日学習した教材の範囲から問題を作成します
    </p>
  </div>

</main>

<script src="nav.js"></script>
<script>
// ══════════════════════════════════════════════════════════
// Firebase
// ══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDOi3w86aPi5R5XjGBaUJ_RvkTiS5WqwF0",
  authDomain: "achedule-app.firebaseapp.com",
  projectId: "achedule-app",
  storageBucket: "achedule-app.firebasestorage.app",
  messagingSenderId: "823858682336",
  appId: "1:823858682336:web:ec4629dbe4ace91a7a7385"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ══════════════════════════════════════════════════════════
// 日付
// ══════════════════════════════════════════════════════════
const today = new Date();
const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
document.getElementById('dateLabel').textContent =
  `${today.getMonth()+1}月${today.getDate()}日（${'日月火水木金土'[today.getDay()]}）`;

// ══════════════════════════════════════════════════════════
// APIキー管理
// ══════════════════════════════════════════════════════════
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  localStorage.setItem('cohere_api_key', key);
  document.getElementById('apiKeyInput').value = '';
  refreshApiKeyUI();
}
function resetApiKey() {
  if (!confirm('APIキーを削除しますか？')) return;
  localStorage.removeItem('cohere_api_key');
  refreshApiKeyUI();
}
function refreshApiKeyUI() {
  const key     = localStorage.getItem('cohere_api_key');
  const section = document.getElementById('apiKeySection');
  const saved   = document.getElementById('apiKeySaved');
  if (key) {
    saved.style.display        = 'block';
    section.style.background   = '#f0fff6';
    section.style.borderColor  = '#a8dfc0';
  } else {
    saved.style.display        = 'none';
    section.style.background   = '';
    section.style.borderColor  = '';
  }
}
refreshApiKeyUI();

// ══════════════════════════════════════════════════════════
// 今日の計画
// ══════════════════════════════════════════════════════════
let todayPlans = [];
let doneSet    = new Set(JSON.parse(localStorage.getItem('review_done_' + dateStr) || '[]'));

async function loadTodayPlans() {
  try {
    const dow  = today.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    const mon  = new Date(today);
    mon.setDate(today.getDate() + diff);
    mon.setHours(0, 0, 0, 0);
    const docId = `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;

    const doc = await db.collection('schedules2').doc(docId).get();
    if (!doc.exists) return;
    const data = doc.data();

    const plans = [];
    Object.entries(data).forEach(([key, val]) => {
      if (!key.startsWith(dateStr)) return;
      if (!val.cell || val.cell.mode !== 'study' || !val.cell.materialId) return;
      const hour = parseInt(key.split('-')[3]);
      plans.push({
        key,
        hour,
        matId:    val.cell.materialId,
        matName:  val.cell.materialName,
        matColor: val.cell.materialColor,
        pageFrom: val.cell.pageFrom,
        pageTo:   val.cell.pageTo,
        done:     doneSet.has(key),
      });
    });
    plans.sort((a, b) => a.hour - b.hour);
    todayPlans = plans;
    renderPlanList();
  } catch(e) {
    console.error('loadTodayPlans error:', e);
  }
}

function renderPlanList() {
  const el = document.getElementById('planList');
  if (!todayPlans.length) {
    el.innerHTML = `<div class="empty-state" style="padding:16px 0;">
      <div class="emoji">📅</div>
      <p>スケジュールページで教材を予約すると<br>ここに表示されます</p>
    </div>`;
    document.getElementById('progressWrap').style.display = 'none';
    return;
  }

  el.innerHTML = '';
  todayPlans.forEach((p, idx) => {
    const item = document.createElement('div');
    item.style.cssText = 'margin-bottom:10px;';
    const pages = p.pageFrom && p.pageTo
      ? ` <span style="color:var(--text-sub)">p${p.pageFrom}〜${p.pageTo}</span>` : '';
    const savedLearned = localStorage.getItem(`review_learned_${dateStr}_${p.key}`) || '';
    item.innerHTML = `
      <div class="plan-item${p.done ? ' done' : ''}" id="planItem-${idx}" onclick="toggleDone(${idx})">
        <div class="plan-dot" style="background:${p.matColor}"></div>
        <div class="plan-info">
          <div class="plan-name">${p.matName}</div>
          <div class="plan-sub">${p.hour}:00〜${p.hour+1}:00${pages}</div>
        </div>
        <div class="plan-check">${p.done ? '✓' : ''}</div>
      </div>
      <div style="padding:0 4px;">
        <button class="learned-toggle" onclick="toggleLearnedArea(${idx})">📝 学んだことを記入する</button>
        <div class="learned-area" id="learnedArea-${idx}">
          <textarea id="learnedText-${idx}"
            placeholder="例：三角関数の加法定理、sin(A+B)=sinAcosB+cosAsinBを覚えた。"
            oninput="saveLearnedText(${idx})"
          >${savedLearned}</textarea>
          <div class="char-hint">ここに記入した内容をもとにAIが問題を作ります</div>
        </div>
      </div>
    `;
    el.appendChild(item);
    if (savedLearned) {
      document.getElementById(`learnedArea-${idx}`).style.display = 'block';
    }
  });

  const done  = todayPlans.filter(p => p.done).length;
  const total = todayPlans.length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width    = pct + '%';
  document.getElementById('progressLabel').textContent  = `${done}/${total} 完了（${pct}%）`;

  const matNames = [...new Set(todayPlans.map(p => p.matName))].join('・');
  document.getElementById('aiNote').textContent = matNames
    ? `対象：${matNames}` : '今日学習した教材の範囲から問題を作成します';
}

function toggleLearnedArea(idx) {
  const area   = document.getElementById(`learnedArea-${idx}`);
  const isOpen = area.style.display === 'block';
  area.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) document.getElementById(`learnedText-${idx}`).focus();
}

function saveLearnedText(idx) {
  const p    = todayPlans[idx];
  const text = document.getElementById(`learnedText-${idx}`).value;
  localStorage.setItem(`review_learned_${dateStr}_${p.key}`, text);
}

function toggleDone(idx) {
  const plan = todayPlans[idx];
  plan.done  = !plan.done;
  if (plan.done) doneSet.add(plan.key);
  else           doneSet.delete(plan.key);
  localStorage.setItem('review_done_' + dateStr, JSON.stringify([...doneSet]));
  renderPlanList();
}

// ══════════════════════════════════════════════════════════
// AI問題生成 ── Cohere API をフロントエンドから直接呼ぶ
// ══════════════════════════════════════════════════════════
let questions     = [];
let currentQIndex = 0;

async function generateQuestions() {
  const apiKey = localStorage.getItem('cohere_api_key');
  if (!apiKey) {
    alert('先にAPIキーを入力・保存してください');
    return;
  }

  // 教材＋学習内容まとめ
  const matGroups = {};
  todayPlans.forEach((p) => {
    const learned = (localStorage.getItem(`review_learned_${dateStr}_${p.key}`) || '').trim();
    if (!matGroups[p.matId]) {
      matGroups[p.matId] = { name: p.matName, ranges: [], learnedList: [] };
    }
    if (p.pageFrom && p.pageTo) matGroups[p.matId].ranges.push(`p${p.pageFrom}〜${p.pageTo}`);
    if (learned)                matGroups[p.matId].learnedList.push(learned);
  });

  const matDetails = Object.values(matGroups).map(m => {
    let d = m.name;
    if (m.ranges.length)      d += `（${m.ranges.join('、')}）`;
    if (m.learnedList.length) d += `\n学んだこと：${m.learnedList.join('／')}`;
    return d;
  }).join('\n');

  const contentDesc = matDetails.trim() || '（本日の教材。一般的な高校の学習内容）';

  const prompt = `あなたは高校生向けの復習問題を作成する先生です。
以下の教材・学習内容をもとに、復習問題を3問作成してください。

【教材・学習内容】
${contentDesc}

【重要な出力ルール】
- 必ず以下のJSON配列のみを返してください
- 説明文・マークダウン記法（\`\`\`など）は一切不要です
- JSONのみを出力してください

[
  {"q":"問題文","a":"模範解答","hint":"解くためのヒント","subject":"科目名"},
  {"q":"問題文","a":"模範解答","hint":"解くためのヒント","subject":"科目名"},
  {"q":"問題文","a":"模範解答","hint":"解くためのヒント","subject":"科目名"}
]`;

  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.innerHTML = `生成中 <span class="loading-dots"><span></span><span></span><span></span></span>`;
  document.getElementById('aiEmptyState').style.display = 'none';
  document.getElementById('questionArea').style.display = 'none';

  try {
    const res = await fetch('https://api.cohere.ai/v1/chat', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type':  'application/json',
      },
      body: JSON.stringify({
        model:       'command-r-08-2024',
        message:     prompt,
        temperature: 0.7,
      }),
    });

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.message || `HTTPエラー ${res.status}`);
    }

    const data = await res.json();
    if (!data.text) throw new Error('APIレスポンスにtextがありません');

    // JSON配列を抽出してパース
    const match = data.text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('JSONが見つかりません。\n受信内容：' + data.text.slice(0, 300));
    questions     = JSON.parse(match[0]);
    currentQIndex = 0;
    renderQuestion();
    btn.innerHTML = '✨ もう一度生成';

  } catch(e) {
    console.error('generateQuestions error:', e);
    document.getElementById('aiEmptyState').style.display = 'block';
    alert('問題生成に失敗しました。\n\n' + e.message);
    btn.innerHTML = '⚠️ 再試行する';
  }

  btn.disabled = false;
}

// ══════════════════════════════════════════════════════════
// 問題表示
// ══════════════════════════════════════════════════════════
function renderQuestion() {
  const area = document.getElementById('questionArea');

  if (!questions.length) {
    area.innerHTML = '<p style="color:var(--text-sub);font-size:13px;padding:8px 0;">問題が生成されませんでした。</p>';
    area.style.display = 'block';
    return;
  }

  // 全問終了
  if (currentQIndex >= questions.length) {
    area.style.display = 'block';
    area.innerHTML = `
      <div style="text-align:center;padding:24px 0;">
        <div style="font-size:44px;">🎉</div>
        <p style="font-size:15px;font-weight:700;color:var(--primary-dk);margin-top:10px;">全問完了！お疲れさまでした</p>
        <p style="font-size:12px;color:var(--text-sub);margin-top:6px;">${questions.length}問すべて解き終わりました</p>
      </div>`;
    return;
  }

  const q = questions[currentQIndex];
  area.style.display = 'block';
  area.innerHTML = `
    <div class="q-nav">問題 ${currentQIndex + 1} / ${questions.length}${q.subject ? ' ・ ' + q.subject : ''}</div>
    <div class="question-card">
      <div class="q-label">Q${currentQIndex + 1}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint ? `<div class="q-hint">💡 ヒント：${q.hint}</div>` : ''}
    </div>
    <div class="answer-area">
      <textarea id="userAnswer" placeholder="ここに答えを入力..."></textarea>
    </div>
    <div class="answer-btn-row">
      <button class="btn-check" id="checkBtn" onclick="checkAnswer()">✅ 答え合わせ</button>
      <button class="btn-skip" onclick="skipQuestion()">スキップ</button>
    </div>
    <div id="feedbackArea"></div>
  `;

  // Enterで答え合わせ（Shift+Enterは改行）
  document.getElementById('userAnswer').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      checkAnswer();
    }
  });
}

// ══════════════════════════════════════════════════════════
// 答え合わせ（Cohere APIで採点）
// ══════════════════════════════════════════════════════════
async function checkAnswer() {
  const apiKey  = localStorage.getItem('cohere_api_key');
  const userAns = (document.getElementById('userAnswer').value || '').trim();
  if (!userAns) { alert('答えを入力してください'); return; }

  const q        = questions[currentQIndex];
  const checkBtn = document.getElementById('checkBtn');
  const feedback = document.getElementById('feedbackArea');

  checkBtn.disabled    = true;
  checkBtn.textContent = '採点中...';
  feedback.className   = 'feedback-box checking';
  feedback.textContent = '🤔 採点しています...';

  const nextLabel = currentQIndex + 1 < questions.length ? '次の問題へ →' : '結果を見る 🎉';

  try {
    const prompt = `以下の問題・模範解答・生徒の回答を見て採点してください。

問題：${q.q}
模範解答：${q.a}
生徒の回答：${userAns}

【出力ルール】必ず以下のJSONのみを返してください（説明文不要）：
{"correct":true,"comment":"コメント（30字以内）"}
または
{"correct":false,"comment":"コメント（30字以内）"}`;

    const res = await fetch('https://api.cohere.ai/v1/chat', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type':  'application/json',
      },
      body: JSON.stringify({
        model:       'command-r',
        message:     prompt,
        temperature: 0.2,
      }),
    });

    const data  = await res.json();
    const raw   = data.text || '';
    const match = raw.match(/\{[\s\S]*?\}/);

    let correct = false, comment = '採点できませんでした';
    if (match) {
      try {
        const parsed = JSON.parse(match[0]);
        correct = !!parsed.correct;
        comment = parsed.comment || '';
      } catch(_) {}
    }

    feedback.className = `feedback-box ${correct ? 'correct' : 'wrong'}`;
    feedback.innerHTML = `
      <strong>${correct ? '⭕ 正解！' : '❌ 不正解'}</strong>${comment ? `　${comment}` : ''}
      <br><span style="font-size:12px;opacity:0.75;margin-top:4px;display:block;">📌 模範解答：${q.a}</span>
      <button class="btn-next" onclick="nextQuestion()">${nextLabel}</button>`;

  } catch(e) {
    // 採点エラーでも模範解答は見せる
    feedback.className = 'feedback-box wrong';
    feedback.innerHTML = `採点エラー。模範解答：<strong>${q.a}</strong>
      <button class="btn-next" onclick="nextQuestion()">${nextLabel}</button>`;
  }

  checkBtn.disabled    = false;
  checkBtn.textContent = '✅ 答え合わせ';
}

function skipQuestion() {
  const q       = questions[currentQIndex];
  const feedback = document.getElementById('feedbackArea');
  const nextLabel = currentQIndex + 1 < questions.length ? '次の問題へ →' : '結果を見る 🎉';
  feedback.className = 'feedback-box wrong';
  feedback.innerHTML = `⏭ スキップ。模範解答：<strong>${q.a}</strong>
    <button class="btn-next" onclick="nextQuestion()">${nextLabel}</button>`;
}

function nextQuestion() {
  currentQIndex++;
  renderQuestion();
}

loadTodayPlans();
