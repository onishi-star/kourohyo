<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>行路表</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── セル内表示 ── */
    .cell-wrapper { position: relative !important; }

    /* 勉強モードセル：薄青背景 + 教材バッジ */
    .cell-study-bg {
      background: linear-gradient(135deg, #e8f0fe 0%, #dceeff 100%) !important;
    }
    .cell-mat-badge {
      position: absolute;
      top: 2px; right: 2px;
      font-size: 9px; font-weight: bold;
      padding: 1px 5px;
      border-radius: 3px;
      color: #fff;
      max-width: 60px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      pointer-events: none; z-index: 2;
    }
    .cell-page-hint {
      position: absolute;
      bottom: 3px; left: 4px;
      font-size: 9px; color: #7a9fd4;
      pointer-events: none; z-index: 2;
    }
    /* 行事モードセル：タイトルをセル中央に表示 */
    .cell-event-title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px; font-weight: bold;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 90%;
      pointer-events: none; z-index: 2;
    }

    /* ── モーダル共通 ── */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center; justify-content: center;
    }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 22px 24px;
      min-width: 320px; max-width: 430px; width: 92%;
      max-height: 92vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    /* ── モード切り替えタブ ── */
    .mode-tabs {
      display: flex; margin-bottom: 16px;
      border-radius: 8px; overflow: hidden;
      border: 1.5px solid #d0d8e8;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .mode-tab {
      flex: 1; padding: 9px 0;
      font-size: 13px; font-weight: bold;
      cursor: pointer; border: none;
      transition: background .15s, color .15s;
    }
    .mode-tab.active-study { background: #4a90e2; color: #fff; }
    .mode-tab.active-event { background: #f06292; color: #fff; }
    .mode-tab.inactive   { background: #f5f5f5; color: #aaa; }

    /* ── 教材リスト ── */
    .mat-list-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      cursor: pointer; border: 2px solid transparent;
      transition: background .12s;
    }
    .mat-list-item:hover { background: #f0f4ff; }
    .mat-list-item.selected { border-color: #4a90e2; background: #e8f0ff; }
    .mat-color-dot {
      width: 13px; height: 13px; border-radius: 50%;
      flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1);
    }
    .mat-list-name { font-size: 13px; flex: 1; }

    /* ── 色スウォッチ（行事） ── */
    .color-swatch {
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; border: 2px solid transparent;
      transition: transform .1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #333; transform: scale(1.15); }

    /* ── 新規教材フォーム ── */
    .new-mat-form {
      border: 1px dashed #bbb; border-radius: 10px;
      padding: 12px; margin-top: 8px; background: #fafcff;
    }
    .new-mat-form input[type=text] {
      width: 100%; padding: 6px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px;
      box-sizing: border-box; margin-bottom: 8px;
    }
    .form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .progress-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .progress-row label { font-size: 13px; width: 84px; flex-shrink: 0; }
    .progress-row input[type=number] {
      width: 66px; padding: 5px 8px;
      border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
    }

    /* ── 教材管理モーダル ── */
    #mat-manage-overlay {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      z-index: 400;
      align-items: center; justify-content: center;
    }

    /* ── 色塗りモード中：セルにペンカーソル ── */
    #calendar[style*="crosshair"] .cell-wrapper {
      cursor: crosshair !important;
    }
    #calendar[style*="crosshair"] .cell-wrapper:hover {
      filter: brightness(0.93);
    }

    /* ── 集計パネル ── */
    #summary-panel {
      padding: 14px 14px 12px;
      background: #f8f9fb;
      border-top: 2px solid #e8eaf0;
      width: 100%; box-sizing: border-box;
    }
    #summary-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .summary-tab {
      padding: 4px 12px; border-radius: 14px;
      border: 1px solid #ccc; font-size: 12px;
      cursor: pointer; background: #fff;
    }
    .summary-tab.active { background: #4a90e2; color: #fff; border-color: #4a90e2; }
    .summary-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 4px; }
    .summary-label { width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; font-weight: bold; }
    .summary-bar-wrap { flex: 1; background: #e0e0e0; border-radius: 4px; height: 14px; overflow: hidden; }
    .summary-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .summary-time { width: 54px; text-align: right; flex-shrink: 0; color: #444; }

    /* ── ファイル添付タブ ── */
    .day-modal-tabs {
      display: flex;
      border-radius: 8px; overflow: hidden;
      border: 1.5px solid #d0d8e8;
      margin-bottom: 14px;
    }
    .day-modal-tab {
      flex: 1; padding: 8px 0;
      font-size: 13px; font-weight: bold;
      cursor: pointer; border: none;
      background: #f5f5f5; color: #aaa;
      transition: background .15s, color .15s;
      font-family: inherit;
    }
    .day-modal-tab.active { background: #4a90e2; color: #fff; }

    /* ── アップロードゾーン ── */
    .upload-zone {
      border: 2px dashed #c0ccdd; border-radius: 10px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: background .15s, border-color .15s; background: #f8faff;
    }
    .upload-zone:hover, .upload-zone.dragover { background: #eef4ff; border-color: #4a90e2; }
    .upload-zone input { display: none; }
    .upload-zone .uz-icon { font-size: 32px; margin-bottom: 6px; }
    .upload-zone .uz-text { font-size: 13px; color: #888; line-height: 1.5; }

    /* ── ファイルグリッド ── */
    .file-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-top: 12px; max-height: 240px; overflow-y: auto;
    }
    .file-thumb {
      position: relative; border-radius: 8px; overflow: hidden;
      aspect-ratio: 1; background: #f0f4ff; cursor: pointer;
      border: 1px solid #e0e8f0; transition: transform .12s;
    }
    .file-thumb:hover { transform: scale(1.04); }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .file-thumb .pdf-thumb {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; padding: 6px;
    }
    .file-thumb .pdf-icon { font-size: 26px; }
    .file-thumb .pdf-name {
      font-size: 9px; color: #555; text-align: center;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; word-break: break-all;
    }
    .file-thumb .del-btn {
      position: absolute; top: 3px; right: 3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.55); color: white;
      border: none; font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .file-thumb:hover .del-btn { opacity: 1; }

    /* ── アップロード進捗 ── */
    .upload-progress { margin-top: 10px; display: none; }
    .upload-progress .prog-bar-wrap {
      background: #e0e8f0; border-radius: 4px; height: 6px; overflow: hidden;
    }
    .upload-progress .prog-bar {
      height: 100%; background: #4a90e2; border-radius: 4px; transition: width .2s;
    }
    .upload-progress .prog-label {
      font-size: 11px; color: #888; margin-top: 4px; text-align: center;
    }

    /* ── マンスリーセルのファイルバッジ ── */
    .cell-file-badge {
      position: absolute; bottom: 3px; right: 3px;
      font-size: 11px; background: rgba(74,144,226,0.18);
      border-radius: 4px; padding: 1px 4px; pointer-events: none;
    }
  </style>

 <style>
  #_nav_side {
    position: fixed !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
  }
  #_nav_bar {
    position: fixed !important;
    bottom: 0 !important;
  }</style>

</head>
<body>

<!-- ══ ログイン画面 ══ -->
<div id="auth-container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:15px; font-family:sans-serif;">
  <h2 style="color:#333; margin-bottom:10px;">スケジュールアプリ</h2>
  <input type="email" id="auth-email" placeholder="メールアドレス" style="padding:10px; border:1px solid #ccc; border-radius:5px; width:250px; font-size:14px;">
  <input type="password" id="auth-password" placeholder="パスワード" style="padding:10px; border:1px solid #ccc; border-radius:5px; width:250px; font-size:14px;">
  <button id="auth-login" style="padding:10px 20px; background-color:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; font-size:14px;">ログイン</button>
  <button id="auth-signup" style="padding:8px 15px; background-color:#2196F3; color:white; border:none; border-radius:5px; cursor:pointer; font-size:14px;">新規登録</button>
  <p id="auth-error" style="color:red; display:none; margin:5px 0;"></p>
</div>

<div id="app-content" style="display:none;">

<!-- ══ 設定モーダル ══ -->
<div id="modal-overlay" class="modal-overlay" style="z-index:200;">
  <div class="modal-box" style="min-width:320px; max-width:400px;">
    <h2 style="margin-bottom:16px; font-size:16px;">⚙️ 設定</h2>
    
    <!-- プリセット選択タブ -->
    <div class="mode-tabs" style="margin-bottom:16px;">
      <button class="mode-tab active-study" id="tab-basic" onclick="switchSettingsTab('basic')">基本設定</button>
      <button class="mode-tab inactive" id="tab-preset" onclick="switchSettingsTab('preset')">プリセット</button>
    </div>
    
    <!-- 基本設定パネル -->
    <div id="panel-basic">
      <h3 style="margin-bottom:12px; font-size:14px;">週の開始曜日</h3>
      <div id="day-select-buttons" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:20px;"></div>

      <h3 style="margin-bottom:10px; font-size:14px;">🎨 一括色塗り</h3>
      <div style="margin-bottom:8px;">
        <div style="font-size:12px; color:#888; margin-bottom:6px;">色を選んでセルをタップすると塗れます</div>
        <div id="custom-colors" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;"></div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
          <button class="color-btn" id="btn-add"      onclick="addCustomColor()" style="font-size:12px; padding:5px 12px;">＋色を追加</button>
          <button class="color-btn" id="btn-clear"    onclick="setColor('clear'); closeModal();" style="font-size:12px; padding:5px 12px;">🗑 色を消す</button>
          <button class="color-btn" id="btn-deselect" onclick="deselectColor(); closeModal();" style="font-size:12px; padding:5px 12px;">解除</button>
        </div>
        <div id="current-color-label" style="font-size:12px; color:#4a90e2; margin-top:6px; font-weight:bold;"></div>
      </div>
    </div>
    
    <!-- プリセットパネル -->
    <div id="panel-preset" style="display:none;">
      <h3 style="margin-bottom:12px; font-size:14px;">放課後学習プリセット</h3>
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:5px;">学校タイプ</label>
        <div style="display:flex; gap:8px;">
          <button id="preset-6class" onclick="applyPreset('6class')" style="flex:1; padding:8px; background:#e3f2fd; border:1px solid #2196f3; border-radius:6px; cursor:pointer; font-size:12px;">6限タイプ</button>
          <button id="preset-7class" onclick="applyPreset('7class')" style="flex:1; padding:8px; background:#e3f2fd; border:1px solid #2196f3; border-radius:6px; cursor:pointer; font-size:12px;">7限タイプ</button>
        </div>
      </div>
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:5px;">勉強モード</label>
        <div style="display:flex; gap:8px;">
          <button id="preset-proceed" onclick="setStudyMode('proceed')" style="flex:1; padding:8px; background:#f3e5f5; border:1px solid #9c27b0; border-radius:6px; cursor:pointer; font-size:12px;">プロシード</button>
          <button id="preset-bunpla" onclick="setStudyMode('bunpla')" style="flex:1; padding:8px; background:#f3e5f5; border:1px solid #9c27b0; border-radius:6px; cursor:pointer; font-size:12px;">文プラ</button>
        </div>
      </div>
      <div style="margin-bottom:15px;">
        <label style="font-size:12px; color:#666; display:block; margin-bottom:5px;">対象曜日</label>
        <div id="preset-days" style="display:flex; gap:6px; flex-wrap:wrap;">
          <label style="font-size:12px;"><input type="checkbox" value="1" checked> 月</label>
          <label style="font-size:12px;"><input type="checkbox" value="2" checked> 火</label>
          <label style="font-size:12px;"><input type="checkbox" value="3" checked> 水</label>
          <label style="font-size:12px;"><input type="checkbox" value="4" checked> 木</label>
          <label style="font-size:12px;"><input type="checkbox" value="5" checked> 金</label>
          <label style="font-size:12px;"><input type="checkbox" value="6"> 土</label>
          <label style="font-size:12px;"><input type="checkbox" value="0"> 日</label>
        </div>
      </div>
      <button onclick="applyCurrentPreset()" style="width:100%; padding:10px; background:#4caf50; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px; margin-bottom:10px;">プリセットを適用</button>
    </div>
    
    <button onclick="closeModal()" style="padding:8px 24px; border-radius:6px; border:1px solid #ccc; cursor:pointer;">閉じる</button>
  </div>
</div>

<!-- ══ 日メモモーダル（マンスリー用） ══ -->
<div id="day-modal-overlay" class="modal-overlay" style="z-index:200;">
  <div class="modal-box" style="min-width:300px; max-width:400px;">
    <h2 id="day-modal-title" style="margin-bottom:12px; font-size:16px;"></h2>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;" id="day-modal-colors"></div>
    <textarea id="day-modal-memo" style="width:100%; height:120px; border:1px solid #ccc; border-radius:6px; padding:8px; font-size:14px; resize:none; font-family:sans-serif;" placeholder="この日のメモを入力..."></textarea>
    <div style="display:flex; align-items:center; gap:8px; margin-top:10px;">
      <input type="checkbox" id="day-modal-check">
      <label for="day-modal-check" style="font-size:14px;">完了</label>
    </div>
    <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
      <button onclick="saveDayModal()" style="padding:8px 20px; background:#4a90e2; color:white; border:none; border-radius:6px; cursor:pointer;">保存</button>
      <button onclick="closeDayModal()" style="padding:8px 20px; border:1px solid #ccc; border-radius:6px; cursor:pointer;">閉じる</button>
    </div>
  </div>
</div>

<!-- ══ ファイルビューアモーダル ══ -->
<div id="file-viewer-overlay" style="
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.88); z-index:600;
  align-items:center; justify-content:center; flex-direction:column;">
  <button onclick="closeFileViewer()" style="
    position:absolute; top:16px; right:16px;
    background:rgba(255,255,255,0.15); border:none; color:white;
    font-size:22px; width:40px; height:40px; border-radius:50%;
    cursor:pointer; display:flex; align-items:center; justify-content:center;">✕</button>
  <div id="file-viewer-content" style="max-width:92vw; max-height:88vh; display:flex; align-items:center; justify-content:center;"></div>
  <div id="file-viewer-name" style="color:rgba(255,255,255,0.7); font-size:12px; margin-top:10px; text-align:center;"></div>
</div>

<!-- ══ ポモドーロ起動モーダル ══ -->
<div id="pomodoro-modal-overlay" class="modal-overlay" style="z-index:350;">
  <div class="modal-box" style="text-align:center; max-width:340px;">
    <div style="font-size:32px; margin-bottom:8px;">🍅</div>
    <div id="pom-subject" style="font-size:16px; font-weight:bold; margin-bottom:6px;"></div>
    <div id="pom-pages" style="font-size:12px; color:#7a9fd4; margin-bottom:20px;"></div>
    <button id="pom-go-btn" onclick="pomGoToTimer()"
      style="width:100%; padding:14px; background:#e05a2b; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px;">
      ▶ ポモドーロタイマーへ
    </button>
    <div style="display:flex; gap:8px; justify-content:center; margin-top:4px;">
      <button onclick="openCellModalFromPom()"
        style="font-size:12px; color:#4a90e2; background:none; border:1px dashed #4a90e2; border-radius:6px; padding:5px 14px; cursor:pointer;">✏️ 予約を編集</button>
      <button onclick="closePomodoroModal()"
        style="font-size:12px; color:#aaa; background:none; border:1px solid #ddd; border-radius:6px; padding:5px 14px; cursor:pointer;">閉じる</button>
    </div>
  </div>
</div>

<!-- ══ セル編集モーダル ══ -->
<div id="cell-modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <div id="cell-modal-title" style="font-size:15px; font-weight:bold;"></div>
      <div id="cell-modal-time" style="font-size:12px; color:#888; background:#f3f4f6; padding:3px 10px; border-radius:10px;"></div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active-study" id="mode-tab-study" onclick="switchCellMode('study')">📚 勉強予約</button>
      <button class="mode-tab inactive"     id="mode-tab-event" onclick="switchCellMode('event')">📅 行事・予定</button>
    </div>
    <div id="panel-study">
      <div style="font-size:12px; color:#777; margin-bottom:5px;">教材を選択（なしでもOK）</div>
      <div id="mat-list" style="max-height:180px; overflow-y:auto; border:1px solid #e8eef8; border-radius:8px; padding:4px; margin-bottom:8px;"></div>
      <button onclick="toggleNewMatForm()" id="new-mat-toggle"
        style="font-size:12px; color:#4a90e2; border:1px dashed #4a90e2; background:#f0f6ff; border-radius:6px; padding:4px 12px; cursor:pointer; margin-bottom:4px;">
        ＋ 新しい教材を追加
      </button>
      <div class="new-mat-form" id="new-mat-form" style="display:none;">
        <input type="text" id="new-mat-name" placeholder="教材名（例：英単語帳、数学B）">
        <div class="form-row">
          <label style="font-size:12px;">色：</label>
          <input type="color" id="new-mat-color" value="#4a90e2" style="width:38px;height:28px;border:none;cursor:pointer;">
          <label style="font-size:12px; margin-left:6px;">カテゴリ：</label>
          <input type="text" id="new-mat-category" placeholder="例：英語、数学" style="flex:1; padding:4px 8px; border:1px solid #ccc; border-radius:6px; font-size:12px;">
          <button onclick="saveNewMaterial()" style="padding:5px 12px; background:#4a90e2; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer;">追加</button>
        </div>
      </div>
      <div class="progress-row">
        <label>ページ予定：</label>
        <input type="number" id="mat-page-from" min="0" placeholder="開始">
        <span style="font-size:12px; color:#777;">〜</span>
        <input type="number" id="mat-page-to" min="0" placeholder="終了">
        <span style="font-size:12px; color:#777;">p</span>
      </div>
    </div>
    <div id="panel-event" style="display:none;">
      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#777; display:block; margin-bottom:4px;">タイトル</label>
        <input type="text" id="event-title" placeholder="例：部活、外出、塾、模試..."

function openIDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("scheduleDB", 2);
    r.onupgradeneeded = e => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains("cells"))     idb.createObjectStore("cells",     { keyPath:"id" });
      if (!idb.objectStoreNames.contains("pending"))   idb.createObjectStore("pending",   { keyPath:"id" });
      if (!idb.objectStoreNames.contains("materials")) idb.createObjectStore("materials", { keyPath:"id" });
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
async function idbSet(store, val) {
  const idb = await openIDB();
  return new Promise((res, rej) => {
    const tx = idb.transaction(store, "readwrite");
    tx.objectStore(store).put(val);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}
async function idbGetAll(store) {
  const idb = await openIDB();
  return new Promise((res, rej) => {
    const tx = idb.transaction(store, "readonly");
    const r  = tx.objectStore(store).getAll();
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
async function idbDelete(store, id) {
  const idb = await openIDB();
  return new Promise((res, rej) => {
    const tx = idb.transaction(store, "readwrite");
    tx.objectStore(store).delete(id);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

function adjustHeaderTop() {

function getTextColor(hex) {
  if (!hex || hex.length < 4) return "#000";
  let h = hex.replace("#","");
  if (h.length === 3) h = h.split("").map(c=>c+c).join("");
  const r=parseInt(h.substring(0,2),16), g=parseInt(h.substring(2,4),16), b=parseInt(h.substring(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? "#000" : "#fff";
}
function getColorStyle(colorKey) {
  if (!colorKey) return "";
  if (colorKey === "study") return "#a0c4ff";
  if (colorKey === "club")  return "#ffadad";
  if (colorKey === "rest")  return "#caffbf";
  if (colorKey.startsWith("custom-")) {
    const idx = parseInt(colorKey.split("-")[1]);
    return customColors[idx] ? customColors[idx].color : "";
  }
  return "";
}

function loadMonthly() {
  const year=currentMonthDate.getFullYear(), month=currentMonthDate.getMonth();
  document.getElementById("month-label").innerText = `${year}年${month+1}月`;
  const firstDay=new Date(year,month,1), lastDay=new Date(year,month+1,0);
  const startOffset=(firstDay.getDay()-weekStartDay+7)%7;
  const rows=Math.ceil((startOffset+lastDay.getDate())/7);
  const topBarH=document.getElementById("top-bar").offsetHeight;
  const cal=document.getElementById("monthly-calendar");
  cal.innerHTML="";
  for (let i=0;i<7;i++) {
    const h=document.createElement("div");
    h.innerText=allDayNames[(weekStartDay+i)%7];
    h.style.cssText=`background:#333;color:white;text-align:center;padding:6px;font-size:13px;position:sticky;top:${topBarH}px;z-index:10;`;
    cal.appendChild(h);
  }
  const today=new Date();
  db.collection("monthly").doc(`monthly-${year}-${String(month+1).padStart(2,'0')}`).get().then(doc=>{
    const md=doc.exists?doc.data():{};
    for (let i=0;i<rows*7;i++) {
      const cell=document.createElement("div");
      const dayNum=i-startOffset+1, isValid=dayNum>=1&&dayNum<=lastDay.getDate();
      cell.style.cssText="border:1px solid #ccc;min-height:80px;padding:4px;box-sizing:border-box;cursor:pointer;position:relative;font-size:12px;";
      if (isValid) {
        const dateObj=new Date(year,month,dayNum);
        const isToday=dateObj.getFullYear()===today.getFullYear()&&dateObj.getMonth()===today.getMonth()&&dateObj.getDate()===today.getDate();
        const dayKey=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
        const saved=md[dayKey]||{memo:"",color:"",checked:false};
        const bg=saved.color?getColorStyle(saved.color):(isToday?"#fffde7":"");
        const tc=bg?getTextColor(bg):"#333";
        if (bg) cell.style.background=bg;
        
        // 土日の背景色を設定
        const dayOfWeek = dateObj.getDay();
        if (dayOfWeek === 6) { // 土曜日
          cell.classList.add("monthly-sat");
        } else if (dayOfWeek === 0) { // 日曜日
          cell.classList.add("monthly-sun");
        }
        const dl=document.createElement("div");
        dl.style.cssText=`font-weight:bold;color:${isToday?'#f9a825':tc};margin-bottom:2px;`;
        dl.innerText=dayNum;
        if (saved.checked){const ck=document.createElement("span");ck.innerText=" ✓";ck.style.cssText="color:#4caf50;font-weight:bold;";dl.appendChild(ck);}
        cell.appendChild(dl);
        if (saved.memo){const mv=document.createElement("div");mv.style.cssText=`font-size:11px;color:${tc};overflow:hidden;max-height:48px;${saved.checked?'text-decoration:line-through;opacity:0.5;':''}`;mv.innerText=saved.memo;cell.appendChild(mv);}
        cell.onclick=()=>openDayModal(dayKey,year,month,dayNum,md);
      } else { cell.style.background="#f5f5f5"; cell.style.cursor="default"; }
      cal.appendChild(cell);
    }
    // ファイルバッジを付加
    setTimeout(attachFileBadges, 300);
  }).catch(e=>console.error(e));
}

function onDragLeave(e) { document.getElementById('upload-zone').classList.remove('dragover'); }
function onDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('dragover'); uploadFiles([...e.dataTransfer.files]); }
function onFileSelect(e) { uploadFiles([...e.target.files]); e.target.value = ''; }

async function uploadFiles(files) {
  const validFiles = files.filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
  if (!validFiles.length) { alert('画像またはPDFを選択してください'); return; }
  const prog = document.getElementById('upload-progress');
  const bar  = document.getElementById('prog-bar');
  const lbl  = document.getElementById('prog-label');
  prog.style.display = 'block';
  for (let i = 0; i < validFiles.length; i++) {
    const file = validFiles[i];
    const ext  = file.name.split('.').pop();
    const path = `monthly/${_fileDayKey}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
    const ref  = storage.ref(path);
    lbl.textContent = `${i+1}/${validFiles.length} アップロード中: ${file.name}`;
    await new Promise((resolve, reject) => {
      const task = ref.put(file);
      task.on('state_changed',
        snap => { bar.style.width = Math.round(snap.bytesTransferred / snap.totalBytes * 100) + '%'; },
        err  => { console.error(err); reject(err); },
        resolve
      );
    });
    const url  = await ref.getDownloadURL();
    await saveFileMeta({ path, url, name: file.name, type: file.type, ts: Date.now() });
  }
  bar.style.width = '100%';
  lbl.textContent = '完了！';
  setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0%'; }, 1200);
  loadFileList();
  attachFileBadges();
}

async function saveFileMeta(meta) {
  const docRef = db.collection('monthly_files').doc(_fileMonthDocId);
  const doc = await docRef.get();
  const existing = doc.exists ? (doc.data()[_fileDayKey] || []) : [];
  existing.push(meta);
  const u = {}; u[_fileDayKey] = existing;
  await docRef.set(u, { merge: true });
}

async function loadFileList() {
  const grid = document.getElementById('file-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="color:#bbb;font-size:12px;padding:8px 0;">読み込み中...</div>';
  try {
    const doc = await db.collection('monthly_files').doc(_fileMonthDocId).get();
    const files = doc.exists ? (doc.data()[_fileDayKey] || []) : [];
    if (!files.length) {
      grid.innerHTML = '<div style="color:#bbb;font-size:12px;padding:8px 0;grid-column:1/-1;">まだファイルがありません</div>';
      return;
    }
    grid.innerHTML = '';
    files.forEach((f, idx) => {
      const thumb = document.createElement('div');
      thumb.className = 'file-thumb';
      const isPdf = f.type === 'application/pdf';
      thumb.innerHTML = isPdf
        ? `<div class="pdf-thumb"><div class="pdf-icon">📄</div><div class="pdf-name">${escHtml(f.name)}</div></div>`
        : `<img src="${f.url}" alt="${escHtml(f.name)}" loading="lazy">`;
      const del = document.createElement('button');
      del.className = 'del-btn'; del.textContent = '✕'; del.title = '削除';
      del.onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`「${f.name}」を削除しますか？`)) return;
        await deleteFile(f, idx);
        loadFileList(); attachFileBadges();
      };
      thumb.appendChild(del);
      thumb.onclick = () => openFileViewer(f);
      grid.appendChild(thumb);
    });
  } catch(e) {
    console.error(e);
    grid.innerHTML = '<div style="color:#e88;font-size:12px;padding:8px 0;grid-column:1/-1;">読み込みに失敗しました</div>';
  }
}

async function deleteFile(fileMeta, idx) {
  try { await storage.ref(fileMeta.path).delete(); } catch(e) { console.warn(e); }
  const docRef = db.collection('monthly_files').doc(_fileMonthDocId);
  const doc = await docRef.get();
  if (!doc.exists) return;
  const files = doc.data()[_fileDayKey] || [];
  files.splice(idx, 1);
  const u = {}; u[_fileDayKey] = files;
  await docRef.set(u, { merge: true });
}

function openFileViewer(f) {
  const overlay = document.getElementById('file-viewer-overlay');
  const content = document.getElementById('file-viewer-content');
  document.getElementById('file-viewer-name').textContent = f.name;
  if (f.type === 'application/pdf') {
    content.innerHTML = `<div style="text-align:center;"><div style="font-size:64px;margin-bottom:16px;">📄</div>
      <a href="${f.url}" target="_blank" style="display:inline-block;padding:12px 28px;background:#4a90e2;color:white;border-radius:8px;text-decoration:none;font-weight:bold;font-size:14px;">PDFを開く（新しいタブ）</a></div>`;
  } else {
    content.innerHTML = `<img src="${f.url}" style="max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain;">`;
  }
  overlay.style.display = 'flex';
}
function closeFileViewer() {
  document.getElementById('file-viewer-overlay').style.display = 'none';
  document.getElementById('file-viewer-content').innerHTML = '';
}

async function attachFileBadges() {
  const year  = currentMonthDate.getFullYear();
  const month = currentMonthDate.getMonth();
  const docId = `monthly-${year}-${String(month+1).padStart(2,'0')}`;
  try {
    const doc = await db.collection('monthly_files').doc(docId).get();
    if (!doc.exists) return;
    const data = doc.data();
    document.querySelectorAll('#monthly-calendar > div').forEach(cell => {
      const dayEl = cell.querySelector('div[style*="font-weight:bold"]');
      if (!dayEl) return;
      const dayNum = parseInt(dayEl.textContent);
      if (isNaN(dayNum)) return;
      const dayKey = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const count = (data[dayKey] || []).length;
      cell.querySelectorAll('.cell-file-badge').forEach(b => b.remove());
      if (count > 0) {
        const badge = document.createElement('div');
        badge.className = 'cell-file-badge';
        badge.textContent = `📎${count}`;
        cell.appendChild(badge);
      }
    });
  } catch(e) {}
}

function renderCustomColorButtons() {

function addCustomColor() {
  const name=prompt("色の名前を入力してください"); if (!name) return;

  inp.style.cssText="position:fixed;top:-100px;left:-100px;opacity:0;"; document.body.appendChild(inp);
  inp.addEventListener("change",()=>{ const col=inp.value; document.body.removeChild(inp); customColors.push({name,color:col}); localStorage.setItem("customColors",JSON.stringify(customColors)); renderCustomColorButtons(); });
  inp.addEventListener("cancel",()=>{ if(document.body.contains(inp)) document.body.removeChild(inp); });
  setTimeout(()=>inp.click(),50);

function setColor(color) {
  currentColor=color;
  document.querySelectorAll(".color-btn").forEach(b=>{b.style.outline="";b.style.fontWeight="";});
  let ab=null;
  if (color==="clear") ab=document.getElementById("btn-clear");

  if (ab){ab.style.outline="3px solid #333";ab.style.fontWeight="bold";}
  const lbl=document.getElementById("current-color-label");
  if (color==="clear") lbl.innerText="✏️ 色を消す";
  else if (color.startsWith("custom-")) { const idx=parseInt(color.split("-")[1]); lbl.innerText="✏️ "+customColors[idx].name; }

// 週ナビゲーション
// ════════════════════════════════════════
function changeWeek(offset) { currentWeek+=offset; loadWeek(); }
function getWeekMondayBase() {
  const today=new Date(), dow=today.getDay();
  const diff=dow===0?-6:1-dow;
  const m=new Date(today); m.setDate(today.getDate()+diff+currentWeek*7); m.setHours(0,0,0,0);
  return m;
}
function getStartOfWeek() {
  const today=new Date();
  today.setHours(0,0,0,0);
  const dow=today.getDay(); // 0=日〜6=土
  // 今日からweekStartDayまで何日前か
  const diff=((dow - weekStartDay) + 7) % 7;
  const s=new Date(today);
  s.setDate(today.getDate() - diff + currentWeek*7);
  return s;
}
function formatDate(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
function getDateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getWeekDocId(){ return getDateKey(getStartOfWeek()); }
function getCellDateKey(hour,col){
  const s=getStartOfWeek(), d=new Date(s); d.setDate(s.getDate()+col); d.setHours(0,0,0,0);
  return getDateKey(d)+`-${String(hour).padStart(2,'0')}`;
}
function updateHeaders() {
  const today=new Date(), start=getStartOfWeek(), topBarH=document.getElementById("top-bar").offsetHeight;
  for (let j=0;j<7;j++){
    const d=new Date(start); d.setDate(start.getDate()+j);
    const isToday=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
    const h=document.getElementById("header-"+j);
    h.innerText=formatDate(d)+" "+allDayNames[d.getDay()]; h.style.top=topBarH+"px";
    isToday?h.classList.add("today-header"):h.classList.remove("today-header");
  }
  const eh=document.querySelector(".header:first-child"); if(eh) eh.style.top=topBarH+"px";
}

async function saveCell(cellId,colIndex,hour,newText,newColor,newChecked) {
  if (!currentWeekDocId) return;
  const key=getCellDateKey(hour,colIndex);
  const cell=document.getElementById(cellId);
  const checkbox=document.getElementById("check-"+cellId);
  const existing=currentWeekData[key]||{};
  const entry={id:currentWeekDocId+"__"+key,docId:currentWeekDocId,key,text:newText!==null?newText:(cell?.innerText.trim()||""),color:newColor!==null?newColor:(existing.color||""),checked:newChecked!==null?newChecked:(checkbox?.checked||false),cell:existing.cell||null};
  await idbSet("cells",entry);
  if (navigator.onLine){ const u={}; u[key]={text:entry.text,color:entry.color,checked:entry.checked,cell:entry.cell}; db.collection("schedules2").doc(entry.docId).set(u,{merge:true}).catch(e=>console.error(e)); }
  else await idbSet("pending",entry);
  // 備考行（hour===4）のテキストをマンスリーのmemoに同期
  if (hour===4 && navigator.onLine) { syncWeeklyToMonthly(colIndex, entry.text); }
  setTimeout(loadWeek,200);
}
async function saveCellData(cellId,colIndex,hour,cellRecord) {
  if (!currentWeekDocId) return;
  const key=getCellDateKey(hour,colIndex);
  const cell=document.getElementById(cellId);
  const checkbox=document.getElementById("check-"+cellId);
  const existing=currentWeekData[key]||{};
  const entry={id:currentWeekDocId+"__"+key,docId:currentWeekDocId,key,text:existing.text||(cell?.innerText.trim()||""),color:existing.color||"",checked:existing.checked||(checkbox?.checked||false),cell:cellRecord};
  await idbSet("cells",entry);
  if (navigator.onLine){ const u={}; u[key]={text:entry.text,color:entry.color,checked:entry.checked,cell:entry.cell}; db.collection("schedules2").doc(entry.docId).set(u,{merge:true}).catch(e=>console.error(e)); }
  else await idbSet("pending",entry);
  currentWeekData[key]=entry;
  setTimeout(loadWeek,200);
}

// ════════════════════════════════════════
// 週読み込み・セル描画
// ════════════════════════════════════════
async function loadWeek() {
  const start=getStartOfWeek(), end=new Date(start); end.setDate(start.getDate()+6);
  document.getElementById("week-label").innerText=formatDate(start)+" 〜 "+formatDate(end);
  currentWeekDocId=getWeekDocId(); updateHeaders();
  let data={};
  if (navigator.onLine) {
    try {
      const doc=await db.collection("schedules2").doc(currentWeekDocId).get();
      data=doc.exists?doc.data():{};
      for (const [k,v] of Object.entries(data)) {
        await idbSet("cells",{id:currentWeekDocId+"__"+k,docId:currentWeekDocId,key:k,text:v.text||"",color:v.color||"",checked:v.checked||false,cell:v.cell||null});
      }
    } catch(err){ data=await loadFromIDB(); }
  } else { data=await loadFromIDB(); }
  currentWeekData=data;
  applyWeekData(data,start);
  renderSummary(data,start);
  if (navigator.onLine) syncMonthlyMemoToWeekRow(data, start);
}
async function loadFromIDB() {
  const all=await idbGetAll("cells");
  const data={};
  all.filter(e=>e.docId===currentWeekDocId).forEach(e=>{ data[e.key]={text:e.text,color:e.color,checked:e.checked,cell:e.cell||null}; });
  return data;
}
function applyWeekData(data,start) {
  const today=new Date();
  for (let i=4;i<24;i++){
    for (let j=0;j<7;j++){
      const cellId=`cell-${i}-${j}`;
      const cell=document.getElementById(cellId);
      const checkbox=document.getElementById("check-"+cellId);
      const wrapper=document.getElementById("wrapper-"+cellId);
      if (!cell||!checkbox||!wrapper) continue;
      const key=getCellDateKey(i,j);
      const saved=data[key]||{text:"",color:"",checked:false,cell:null};
      const cellData=saved.cell||null;
      let bgColor="", textCol="";
      if (cellData&&cellData.mode==="event"){ bgColor=cellData.color||"#ffadad"; textCol=getTextColor(bgColor); }
      else if (saved.color){ bgColor=getColorStyle(saved.color); textCol=bgColor?getTextColor(bgColor):""; }
      wrapper.style.background=bgColor||"";
      cell.style.color=textCol||"";
      const d=new Date(start); d.setDate(start.getDate()+j);
      const isToday=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
      if (isToday&&!bgColor) wrapper.classList.add("today-col"); else wrapper.classList.remove("today-col");
      if (cellData&&cellData.mode==="study"&&cellData.materialId&&!saved.color) wrapper.classList.add("cell-study-bg"); else wrapper.classList.remove("cell-study-bg");
      checkbox.checked=saved.checked||false;
      cell.style.textDecoration=saved.checked?"line-through":"";
      cell.style.opacity=saved.checked?"0.5":"1";
      // テキストを必ずリセット（週切り替え時に前週の内容が残らないよう）
      if (i===4) { cell.innerText = saved.text || ""; }
      wrapper.querySelectorAll(".cell-mat-badge,.cell-page-hint,.cell-event-title").forEach(el=>el.remove());
      if (cellData){
        if (cellData.mode==="study"&&cellData.materialId){
          const badge=document.createElement("div"); badge.className="cell-mat-badge"; badge.style.background=cellData.materialColor; badge.style.color=getTextColor(cellData.materialColor); badge.innerText=cellData.materialName; wrapper.appendChild(badge);
          if (cellData.pageFrom||cellData.pageTo){ const ph=document.createElement("div"); ph.className="cell-page-hint"; ph.innerText=`p${cellData.pageFrom||"?"}〜${cellData.pageTo||"?"}`; wrapper.appendChild(ph); }
        } else if (cellData.mode==="event"){
          const et=document.createElement("div"); et.className="cell-event-title"; et.style.color=getTextColor(cellData.color||"#ffadad"); et.innerText=cellData.title||"予定"; wrapper.appendChild(et);
        }
      }
      wrapper.onclick=(e)=>{
        if (e.target===checkbox) return;
        if (currentColor){ const newColor=currentColor==="clear"?"":currentColor; const newBg=newColor?getColorStyle(newColor):""; cell.dataset.color=newColor; wrapper.style.background=newBg; cell.style.color=newBg?getTextColor(newBg):""; saveCell(cellId,j,i,null,newColor,null); }
        else {
          const key=getCellDateKey(i,j);
          const savedEntry=currentWeekData[key]||{};
          const cellRecord=savedEntry.cell||null;
          if (cellRecord&&cellRecord.mode==="study") { openPomodoroModal(cellId,j,i,cellRecord); }
          else { openCellModal(cellId,j,i); }
        }
      };
      checkbox.onchange=()=>{ cell.style.textDecoration=checkbox.checked?"line-through":""; cell.style.opacity=checkbox.checked?"0.5":"1"; saveCell(cellId,j,i,null,null,checkbox.checked); };
    }
  }
}

// 集計
// ════════════════════════════════════════
function renderSummary(data,start) {
  const totals={}, daily=Array(7).fill(0);
  for (let i=4;i<24;i++){ for (let j=0;j<7;j++){ const k=getCellDateKey(i,j), s=data[k]; if (s&&s.cell&&s.cell.mode==="study"&&s.cell.materialId){ const id=s.cell.materialId; if (!totals[id]) totals[id]={name:s.cell.materialName,color:s.cell.materialColor,hours:0}; totals[id].hours+=1; daily[j]+=1; } } }
  const barsEl=document.getElementById("summary-bars"); barsEl.innerHTML="";
  const entries=Object.values(totals).sort((a,b)=>b.hours-a.hours);
  const maxH=entries.length?entries[0].hours:1;
  if (!entries.length){ barsEl.innerHTML='<div style="color:#bbb;font-size:12px;padding:4px 0;">この週の勉強予約はまだありません</div>'; }
  else {
    const totalH=entries.reduce((s,e)=>s+e.hours,0);
    const tr=document.createElement("div"); tr.style.cssText="font-size:12px;color:#555;margin-bottom:8px;"; tr.innerHTML=`週間予約時間：<b style="color:#4a90e2;">${totalH}時間</b>`; barsEl.appendChild(tr);
    entries.forEach(entry=>{ const row=document.createElement("div"); row.className="summary-row"; row.innerHTML=`<div class="summary-label" title="${entry.name}">${entry.name}</div><div class="summary-bar-wrap"><div class="summary-bar" style="width:${(entry.hours/maxH*100).toFixed(1)}%;background:${entry.color};"></div></div><div class="summary-time">${entry.hours}h</div>`; barsEl.appendChild(row); });
  }
  renderDailyChart(daily,start);
}
function renderDailyChart(daily,start){
  const labels=[]; for (let j=0;j<7;j++){const d=new Date(start);d.setDate(start.getDate()+j);labels.push(`${d.getMonth()+1}/${d.getDate()}`);}
  const ctx=document.getElementById("summary-chart").getContext("2d");
  if (summaryChart) summaryChart.destroy();
  summaryChart=new Chart(ctx,{type:"bar",data:{labels,datasets:[{label:"予約時間（h）",data:daily,backgroundColor:"rgba(74,144,226,0.7)",borderColor:"rgba(74,144,226,1)",borderWidth:1,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y}時間`}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},title:{display:true,text:"時間",font:{size:11}}},x:{ticks:{font:{size:11}}}}}});
}
function switchSummaryTab(tab,e){
  document.querySelectorAll(".summary-tab").forEach(t=>t.classList.remove("active"));
  if (e&&e.target) e.target.classList.add("active");
  document.getElementById("summary-bar-view").style.display=tab==="bar"?"block":"none";
  document.getElementById("summary-chart-view").style.display=tab==="chart"?"block":"none";
}

// 認証機能
// ════════════════════════════════════════
function setupAuth() {
  // ログインボタン
  document.getElementById('auth-login').addEventListener('click', () => {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const errorEl = document.getElementById('auth-error');
    
    if (!email || !password) {
      errorEl.textContent = 'メールアドレスとパスワードを入力してください';
      errorEl.style.display = 'block';
      return;
    }
    
    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        errorEl.style.display = 'none';
        showApp();
      })
      .catch((error) => {
        errorEl.textContent = 'ログインエラー: ' + error.message;
        errorEl.style.display = 'block';
      });
  });
  
  // 新規登録ボタン
  document.getElementById('auth-signup').addEventListener('click', () => {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const errorEl = document.getElementById('auth-error');
    
    if (!email || !password) {
      errorEl.textContent = 'メールアドレスとパスワードを入力してください';
      errorEl.style.display = 'block';
      return;
    }
    
    if (password.length < 6) {
      errorEl.textContent = 'パスワードは6文字以上にしてください';
      errorEl.style.display = 'block';
      return;
    }
    
    auth.createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
        errorEl.style.display = 'none';
        showApp();
      })
      .catch((error) => {
        errorEl.textContent = '登録エラー: ' + error.message;
        errorEl.style.display = 'block';
      });
  });
  
  // ログアウト機能
  window.logout = function() {
    auth.signOut().then(() => {
      showLogin();
    }).catch((error) => {
      console.error('ログアウトエラー:', error);
    });
  };
  
  // 認証状態の監視
  auth.onAuthStateChanged((user) => {
    if (user) {
      showApp();
    } else {
      showLogin();
    }
  });
}

function showApp() {
  document.getElementById('auth-container').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
}

function showLogin() {
  document.getElementById('auth-container').style.display = 'flex';
  document.getElementById('app-content').style.display = 'none';
}

function applyPreset(type) {

async function applyCurrentPreset() {
  const checkedDays = Array.from(document.querySelectorAll('#preset-days input:checked')).map(cb => parseInt(cb.value));
  if (checkedDays.length === 0) {
    alert('対象曜日を少なくとも1つ選択してください');
    return;
  }
  
  const clubStart = currentPresetType === '6class' ? 15 : 16;
  const studyEnd = currentStudyMode === 'bunpla' ? 22 : 21.33; // 22:00 or 21:20
  
  const presetSchedule = [
    { hour: 6, minute: 0, duration: 60, type: 'event', title: '起床', color: '#ffeb3b' },
    { hour: 7, minute: 0, duration: 60, type: 'study', title: '朝の勉強' },
    { hour: 8, minute: 0, duration: 480, type: 'event', title: '学校', color: '#e3f2fd' },
    { hour: clubStart, minute: 0, duration: 120, type: 'event', title: '部活', color: '#f3e5f5' },
    { hour: 18, minute: 0, duration: (studyEnd - 18) * 60, type: 'study', title: '夜の勉強' },
    { hour: Math.floor(studyEnd) + (studyEnd % 1 >= 0.33 ? 1 : 0), minute: (studyEnd % 1 >= 0.33 ? 20 : 40), duration: 80, type: 'event', title: '終支度', color: '#fff3e0' }
  ];
  
  for (const day of checkedDays) {
    for (const schedule of presetSchedule) {
      await applyPresetToCell(day, schedule);
    }
  }
  
  setTimeout(loadWeek, 500);
  alert('プリセットを適用しました');
}

async function applyPresetToCell(day, schedule) {
  const startHour = Math.floor(schedule.hour);
  const startMinute = schedule.minute;
  const duration = schedule.duration;
  
  const hourSlots = Math.ceil(duration / 60);
  
  for (let i = 0; i < hourSlots; i++) {
    const hour = startHour + i;
    if (hour < 4 || hour >= 24) continue; // 表示範囲外
    
    const cellId = `cell-${hour}-${day}`;
    const colIndex = day;
    
    if (schedule.type === 'study') {
      const cellRecord = {
        mode: "study",
        materialId: null, 
        materialName: "教材未設定",
        materialColor: "#4a90e2",
        pageFrom: null,
        pageTo: null
      };
      await saveCellData(cellId, colIndex, hour, cellRecord);
    } else {
      const cellRecord = {
        mode: "event",
        title: schedule.title,
        color: schedule.color || "#ffadad",
        memo: ""
      };
      await saveCellData(cellId, colIndex, hour, cellRecord);
    }
  }
}

let pomCellId = null, pomCellCol = null, pomCellHour = null;
let pomCellData = null;

function openPomodoroModal(cellId, colIndex, hour, cellData) {
  pomCellId = cellId; pomCellCol = colIndex; pomCellHour = hour;
  pomCellData = cellData;
  const matName = cellData.materialId ? cellData.materialName : "（教材なし）";
  document.getElementById("pom-subject").innerText = "📚 " + matName;
  const from = cellData.pageFrom, to = cellData.pageTo;
  document.getElementById("pom-pages").innerText = (from || to) ? `p${from||"?"}〜${to||"?"} ページ` : "";
  document.getElementById("pomodoro-modal-overlay").style.display = "flex";
}

function closePomodoroModal() {
  document.getElementById("pomodoro-modal-overlay").style.display = "none";
}

function openCellModalFromPom() {
  closePomodoroModal();
  openCellModal(pomCellId, pomCellCol, pomCellHour);
}

function pomGoToTimer() {
  if (!pomCellData) return;
  const params = new URLSearchParams();
  if (pomCellData.materialId)    params.set("matId",    pomCellData.materialId);
  if (pomCellData.materialName)  params.set("matName",  pomCellData.materialName);
  if (pomCellData.materialColor) params.set("matColor", pomCellData.materialColor);
  if (pomCellData.pageFrom)      params.set("from",     pomCellData.pageFrom);
  if (pomCellData.pageTo)        params.set("to",       pomCellData.pageTo);

  // ── 次の勉強予約セルを探してURLに追加 ──
  const nextCell = findNextStudyCell(pomCellCol, pomCellHour);
  if (nextCell) {
    if (nextCell.materialId)    params.set("nextMatId",    nextCell.materialId);
    if (nextCell.materialName)  params.set("nextMatName",  nextCell.materialName);
    if (nextCell.materialColor) params.set("nextMatColor", nextCell.materialColor);
    if (nextCell.pageFrom)      params.set("nextFrom",     nextCell.pageFrom);
    if (nextCell.pageTo)        params.set("nextTo",       nextCell.pageTo);
  }

  window.location.href = "pomodoro.html?" + params.toString();
}

// 指定のコマより後で、最も近い勉強予約セルを探す
function findNextStudyCell(colIndex, hour) {
  // 同じ日の後の時間帯を先に探す
  for (let h = hour + 1; h < 24; h++) {
    const key = getCellDateKey(h, colIndex);
    const entry = currentWeekData[key];
    if (entry && entry.cell && entry.cell.mode === "study" && entry.cell.materialId) {
      return entry.cell;
    }
  }
  // 次の日以降も探す（今週内）
  for (let col = colIndex + 1; col < 7; col++) {
    for (let h = 4; h < 24; h++) {
      const key = getCellDateKey(h, col);
      const entry = currentWeekData[key];
      if (entry && entry.cell && entry.cell.mode === "study" && entry.cell.materialId) {
        return entry.cell;
      }
    }
  }
  return null;
}


// ════════════════════════════════════════
// 備考（4:00行）↔ マンスリー memo 双方向同期
// ════════════════════════════════════════

// ウィークリー備考 → マンスリーmemo に書く
function syncWeeklyToMonthly(colIndex, text) {
  const start = getStartOfWeek();
  const d = new Date(start); d.setDate(start.getDate() + colIndex);
  const dayKey = getDateKey(d);
  const monthDocId = `monthly-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const u = {}; u[dayKey] = { memo: text };
  db.collection("monthly").doc(monthDocId).set(u, { merge: true }).catch(e => console.error(e));
}

// マンスリーmemo → ウィークリー備考（4:00行）に書く
async function syncMonthlyToWeekly(dayKey, memo) {
  const d = new Date(dayKey);
  if (isNaN(d)) return;
  const start = getStartOfWeek();
  let colIndex = -1;
  for (let j = 0; j < 7; j++) {
    const wd = new Date(start); wd.setDate(start.getDate() + j);
    if (getDateKey(wd) === dayKey) { colIndex = j; break; }
  }
  if (colIndex === -1) return;
  const cellId = `cell-4-${colIndex}`;
  const key = getCellDateKey(4, colIndex);
  const existing = currentWeekData[key] || {};
  const entry = {
    id: currentWeekDocId + "__" + key,
    docId: currentWeekDocId,
    key,
    text: memo,
    color: existing.color || "",
    checked: existing.checked || false,
    cell: existing.cell || null
  };
  await idbSet("cells", entry);
  if (navigator.onLine) {
    const u = {}; u[key] = { text: entry.text, color: entry.color, checked: entry.checked, cell: entry.cell };
    db.collection("schedules2").doc(entry.docId).set(u, { merge: true }).catch(e => console.error(e));
  }
  currentWeekData[key] = entry;
  const cellEl = document.getElementById(cellId);
  if (cellEl) cellEl.innerText = memo;
}

// ウィークリー読み込み時、4:00行が空ならmonthlyのmemoを引っ張ってくる
async function syncMonthlyMemoToWeekRow(data, start) {
  for (let j = 0; j < 7; j++) {
    const d = new Date(start); d.setDate(start.getDate() + j);
    const dayKey = getDateKey(d);
    const key = getCellDateKey(4, j);
    const existing = data[key];
    if (existing && existing.text) continue;
    const monthDocId = `monthly-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    try {
      const doc = await db.collection("monthly").doc(monthDocId).get();
      if (!doc.exists) continue;
      const memo = (doc.data()[dayKey] || {}).memo || "";
      if (!memo) continue;
      if (!currentWeekData[key]) currentWeekData[key] = {};
      currentWeekData[key].text = memo;
      const cellEl = document.getElementById(`cell-4-${j}`);
      if (cellEl && !cellEl.innerText.trim()) cellEl.innerText = memo;
    } catch(e) {}
  }
}
